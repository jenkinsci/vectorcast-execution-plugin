name: 'GitHub CI'

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:

    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]
        jdk: [21]

    runs-on: ${{ matrix.platform }}
    name: on ${{ matrix.platform }} with JDK ${{ matrix.jdk }}

    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '${{ matrix.jdk }}'
          check-latest: true
          cache: 'maven'
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6
      - name: Build with Maven
        env:
          BROWSER: chrome-container
        run: |
          git clone https://github.com/jenkinsci/vectorcast-coverage-plugin.git
          pushd vectorcast-coverage-plugin
          git checkout tms_023
          mvn -B -ntp -DskipTests clean install
          popd
          mvn -V --color always -ntp clean verify --file pom.xml -Djenkins.test.timeout=5000 -Dgpg.skip
