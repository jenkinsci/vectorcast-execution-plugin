name: 'CodeCov'

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  coverage:

    runs-on: ubuntu-latest
    name: Create and upload coverage report

    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          check-latest: true
          cache: 'maven'
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6
      - name: Generate coverage with JaCoCo
        run: |
          git clone https://github.com/jenkinsci/vectorcast-coverage-plugin.git
          pushd vectorcast-coverage-plugin
          git checkout tms_023
          mvn -B -ntp -DskipTests clean install
          popd
          mvn -V --color always -ntp clean verify --file pom.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          files: 'target/site/jacoco/jacoco.xml'
          token: ${{secrets.CODECOV_TOKEN}}
